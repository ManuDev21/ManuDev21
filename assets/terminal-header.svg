<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal Window Background -->
  <rect width="700" height="120" rx="12" fill="url(#bg)" stroke="#30363D" stroke-width="1"/>

  <!-- Title Bar -->
  <rect width="700" height="32" rx="12" fill="#161B22"/>
  <rect y="20" width="700" height="12" fill="#161B22"/>

  <!-- Traffic Light Dots -->
  <circle cx="20" cy="16" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="16" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="16" r="6" fill="#27C93F"/>

  <!-- Title Text -->
  <text x="350" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B949E">manu@DESKTOP: ~/profile</text>

  <!-- Terminal Content -->
  <text x="20" y="60" font-family="monospace" font-size="14" fill="#00FF9F" filter="url(#glow)">
    <tspan font-weight="bold">┌──(</tspan><tspan fill="#00FF9F" font-weight="bold">manu㉿DESKTOP</tspan><tspan font-weight="bold">)-[~]</tspan>
  </text>
  <text x="20" y="82" font-family="monospace" font-size="14" fill="#00FF9F" filter="url(#glow)">
    <tspan font-weight="bold">└─$ </tspan><tspan fill="#C9D1D9">init --profile </tspan><tspan fill="#00FF9F" font-weight="bold">ManuDev21</tspan>
  </text>

  <!-- Blinking Cursor -->
  <rect x="195" y="70" width="10" height="16" fill="#00FF9F" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Status Line -->
  <text x="20" y="106" font-family="monospace" font-size="11" fill="#8B949E">
    <tspan fill="#27C93F">●</tspan> ONLINE  |  <tspan fill="#00FF9F">Fullstack Developer</tspan>  |  <tspan fill="#8B949E">Toluca, Mexico</tspan>
  </text>
</svg>
